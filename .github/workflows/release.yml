name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-20.04
            target: x86_64-unknown-linux-gnu
            archive_name: workstation-cli-linux-x86_64.tar.gz
            artifact_name: workstation-cli-linux-x86_64
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            archive_name: workstation-cli-linux-x86_64-musl.tar.gz
            artifact_name: workstation-cli-linux-x86_64-musl
          - runner: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            archive_name: workstation-cli-linux-aarch64.tar.gz
            artifact_name: workstation-cli-linux-aarch64
          - runner: macos-14
            target: x86_64-apple-darwin
            archive_name: workstation-cli-macos-x86_64.tar.gz
            artifact_name: workstation-cli-macos-x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_name: workstation-cli-macos-aarch64.tar.gz
            artifact_name: workstation-cli-macos-aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore cargo cache
        uses: swatinem/rust-cache@v2

      - name: Install Linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc

      - name: Package release binary
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf "dist/${{ matrix.archive_name }}" -C "target/${{ matrix.target }}/release" workstation-cli

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release version
        id: version
        run: |
          set -euo pipefail
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          if [[ -z "$version" ]]; then
            echo "Failed to determine release version from Cargo.toml" >&2
            exit 1
          fi

          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          head_sha="${{ github.sha }}"

          remote_tag_sha=$(git ls-remote --tags origin "refs/tags/$tag^{}" | awk '{print $1}' | head -n 1)

          if [[ -n "$remote_tag_sha" ]]; then
            if [[ "$remote_tag_sha" != "$head_sha" ]]; then
              echo "Release tag $tag already exists for a different commit ($remote_tag_sha). Bump Cargo.toml before releasing again." >&2
              exit 1
            fi

            echo "Release tag $tag already exists for this commit; skipping tag creation."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz | sort > checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true